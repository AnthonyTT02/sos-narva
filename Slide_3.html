<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOS Narva</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body { background:#f8f9fa; margin:0; padding:0; }
    .phone { max-width: 360px; margin: auto; padding: 20px; background: white; border-radius: 28px; min-height: 100vh; position: relative; }

    
    .menu-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 28px;
      cursor: pointer;
      z-index: 10000;
    }
    .menu-icon span {
      display: block;
      height: 3px;
      background: #000;
      margin: 6px 0;
      border-radius: 3px;
    }

    
    .sidebar {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.25);
      padding: 20px;
      transition: 0.3s;
      z-index: 9999;
    }
    .sidebar.active {
      right: 0;
    }
    .sidebar a {
      display: block;
      padding: 8px 0;
      font-size: 16px;
      color: black;
      text-decoration: none;
      cursor: pointer;
    }
    .sidebar a:hover {
      text-decoration: underline;
    }

    .submenu {
      padding-left: 10px;
    }

    
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      z-index: 9998;
    }
    .overlay.active {
      display: block;
    }

    
    .logo { color:#d62828; font-weight: 900; letter-spacing: 1px; }

    input, select { border: 1.5px solid #999; border-radius: 10px; padding: 10px; font-size: 14px; }
    label { font-size: 13px; color: #444; margin-bottom: 4px; }

    .required-text {
      color: red;
      font-size: 12px;
      margin-left: 5px;
    }

    .image-box {
      width: auto;
      height: auto;
      border-radius: 8px;
      overflow: hidden;
    }
    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-confirm {
      display: block;
      margin: 0 auto;
      background-color: #d62828;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      padding: 6px 20px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-confirm:hover {
      background-color: #b22222;
    }

  </style>
</head>
<body>


<div class="overlay" id="overlay"></div>


<div class="sidebar" id="sidebar">
  <a>Авторизая поставщика услуг</a>
  <a>Личный кабинет</a>
  <a>Настройки</a>
  <a>Условия пользования</a>
  <a>Правила безопасности</a>
  <a>Как начать работать с платформой</a>

  <div class="submenu">
    <a>- для юр. лиц</a>
    <a>- для физ. лиц</a>
  </div>

  <a>Контакты</a>
</div>

<div class="phone">

  
  <div class="menu-icon" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h4 class="mb-4 fw-bold" style="color: red;">SOS Narva</h4>

  <label>Ваше имя <span class="required-text">обязательно</span></label>
  <input class="form-control mb-3" value="Белозеров Максим">

  <label style="position: relative; display: block; padding-left: 35px;">
    <img src="img/credit-card.svg" alt="card" style="
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: auto;
    ">
    Добавьте карту <span class="required-text">обязательно</span>
  </label>

  <div class="image-box mb-3">
    <img src="map.jpg" alt="Карта">
  </div>

  <label>Добавьте номер телефона <span class="required-text">обязательно</span></label>
  <input class="form-control mb-3" value="+3725298507">

  <label>Добавьте номер страховки</label>
  <input class="form-control mb-3" value="45445445454545454 PFZ">

  <button class="btn-confirm" onclick="location.href='Slide_4.html'">Подтвердить</button>

</div>

<script>
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const menuBtn = document.getElementById("menuBtn");

  function toggleMenu() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
  }

  menuBtn.onclick = toggleMenu;
  overlay.onclick = toggleMenu;
</script>

</body>
</html>
