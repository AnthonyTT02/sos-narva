<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOS Narva</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <style>
    body { background:#f8f9fa; margin:0; }

    .phone {
      max-width: 360px;
      margin: auto;
      padding: 20px;
      background: white;
      border-radius: 28px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    
    .menu-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 30px;
      cursor: pointer;
      z-index: 10001;
    }

    .menu-icon span {
      display: block;
      height: 3px;
      background: #000;
      margin: 6px 0;
      border-radius: 3px;
    }

    
    .sidebar {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100%;
      background: white;
      padding: 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: 0.35s;
      z-index: 10000;
    }

    .sidebar a {
      display: block;
      padding: 10px 0;
      font-size: 15px;
      color: #111;
    }

    .submenu a {
      padding-right: 15px;
      font-size: 14px;
      color: #444;
    }

    .sidebar.open {
      right: 0;
    }

    

    .field-box {
      background: #f0f0f0;
      border-radius: 10px;
      padding: 12px 15px;
      margin-bottom: 15px;
    }

    .field-box label {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
    }

    .text-value {
      font-weight: 500;
      font-size: 15px;
      white-space: nowrap;
      overflow-x: auto;
    }

    .image-box {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 0;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .required-text {
      color: red;
      font-size: 12px;
      margin-left: 5px;
    }

    .btn-confirm {
      display: block;
      margin: 150px auto 0 auto;
      background-color: #d62828;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      padding: 20px 70px;
      font-size: 25px;
      cursor: pointer;
      transition: background 0.3s;
      position: relative;
    }

    .btn-confirm:hover {
      background-color: #b22222;
    }
  </style>
</head>

<body>

  
  <div class="sidebar" id="sidebar">
    <a>Авторизая поставщика услуг</a>
    <a>Личный кабинет</a>
    <a>Настройки</a>
    <a>Условия пользования</a>
    <a>Правила безопасности</a>
    <a>Как начать работать с платформой</a>

    <div class="submenu">
      <a>- для юр. лиц</a>
      <a>- для физ. лиц</a>
    </div>

    <a>Контакты</a>
  </div>

  <div class="phone">

    
    <div class="menu-icon" id="menuBtn">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <h4 class="mb-4 fw-bold" style="color: red;">SOS Narva</h4>

    <div class="field-box">
      <div class="text-value">Volvo X70 123ADC</div>
    </div>

    <div class="field-box">
      <div class="text-value">Эвакутор</div>
    </div>

    <div class="field-box">
      <label>Местоположение:</label>
      <div class="text-value">Keresee tn: 32, Narva, Estonia</div>
    </div>

    <div class="field-box">
      <label>Стрховой полис</label>
      <div class="text-value">454545454545454 PFZ</div>
    </div>

    <div class="field-box">
      <label>Оплата картой</label>
      <div class="text-value">Master ******* 4330</div>
    </div>

    

    <button class="btn-confirm" onclick="location.href='Slide_5.html'">ОТПРАВИТЬ ЗАПРОС</button>

  </div>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");

    menuBtn.onclick = () => {
      sidebar.classList.toggle("open");
    };
  </script>

</body>
</html>
