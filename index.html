<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOS Narva Mobile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body { background:#f8f9fa; margin:0; padding:0; }
    .screen { max-width:420px; margin:auto; padding:20px; background:white; min-height:100vh; position:relative; }
    .btn-main1 { background:#d62828; color:white; }
    .btn-main2 { background:#00547a; color:white; }
    .btn-main3 { background:#ffffff; color:rgb(0, 26, 112); text-decoration: underline; }

    
    .menu-icon {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 30px;
      cursor: pointer;
      z-index: 10000;
    }
    .menu-icon span {
      display: block;
      height: 3px;
      background: #000;
      margin: 6px 0;
      border-radius: 2px;
      transition: 0.3s;
    }

    
    .sidebar {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.25);
      padding: 20px;
      transition: 0.3s;
      z-index: 9999;
    }
    .sidebar.active {
      right: 0;
    }
    .sidebar a {
      display: block;
      padding: 8px 0;
      font-size: 16px;
      color: black;
      text-decoration: none;
    }
    .sidebar a:hover {
      text-decoration: underline;
    }
    .sidebar p {
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      z-index: 9998;
    }
    .overlay.active {
      display: block;
    }

    
    .list-group-gray {
      background-color: #c7c7c7;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .service-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .service-item input[type="checkbox"] {
      appearance: none;
      width: 24px;
      height: 24px;
      border: 2px solid #d62828;
      border-radius: 5px;
      background: white;
      cursor: pointer;
    }

    .service-item input[type="checkbox"]:checked {
      background:#d62828;
      border-color:#d62828;
    }

    .service-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 6px;
      height: 12px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
  </style>
</head>
<body>


<div class="overlay" id="overlay"></div>


<div class="sidebar" id="sidebar">
  <a>Авторизая поставщика услуг</a>
  <a>Личный кабинет</a>
  <a>Настройки</a>
  <a>Условия пользования</a>
  <a>Правила безопасности</a>
  <a>Как начать работать с платформой</a>
  <div class="submenu">
    <a>- для юр. лиц</a>
    <a>- для физ. лиц</a>
  </div>
  <a>Контакты</a>
</div>


<div class="screen" id="startScreen">

  
  <div class="menu-icon" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h4 class="mb-4 fw-bold" style="color: red;">SOS Narva</h4>
  <p class="text-muted">Требуется:</p>

  <div class="list-group mb-3">

    <label class="list-group-item service-item list-group-gray">
        <input type="checkbox" />
        Эвакуатор
    </label>

    <label class="list-group-item service-item list-group-gray">
        <input type="checkbox" />
        Вскрытие авто / Замена замков
    </label>

    <label class="list-group-item service-item list-group-gray">
        <input type="checkbox" />
        Замена шин, ремонт на дороге
    </label>

    <label class="list-group-item service-item list-group-gray">
        <input type="checkbox" />
        Закончилось топливо
    </label>

    <label class="list-group-item service-item list-group-gray">
      <input type="checkbox" />
      Поиск ближайшего автосервиса
    </label>

  </div>

  <button class="btn btn-main3 w-100">
    <input type="checkbox" />
    Разрешить доступ к геолокации
  </button>

  <a href="Slide_2.html" class="btn btn-main2 w-100 mt-2">
    Далее
  </a>

</div>

<script>
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const menuBtn = document.getElementById("menuBtn");

  function toggleMenu() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
  }

  menuBtn.onclick = toggleMenu;
  overlay.onclick = toggleMenu;
</script>

</body>
</html>
